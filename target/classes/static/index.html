<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escrutinio Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .progress-glow { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-3xl w-full">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Escrutinio General</h1>
                <p class="text-slate-500 font-medium mt-1 flex items-center">
                    <span class="relative flex h-3 w-3 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    Resultados en tiempo real con integridad 
                </p>
            </div>
            <div class="text-right">
                <span class="bg-white px-4 py-2 rounded-lg shadow-sm text-xs font-bold text-slate-600 border border-slate-200">
                    SISTEMA ACTIVO
                </span>
            </div>
        </div>

        <div id="contenedor-votos" class="grid gap-4">
            <div class="animate-pulse flex space-x-4 bg-white p-6 rounded-2xl shadow-sm">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                    <div class="space-y-3"><div class="h-8 bg-slate-100 rounded"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function cargarResultados() {
            try {
                const res = await fetch('http://localhost:8080/api/v1/votacion/resultados');
                const datos = await res.json();
                const contenedor = document.getElementById('contenedor-votos');
                
                // Calculamos el total de votos para porcentajes reales
                const totalVotos = datos.reduce((acc, c) => acc + c.votos, 0);

                contenedor.innerHTML = ''; 
                
                datos.forEach(c => {
                    const porcentaje = totalVotos > 0 ? (c.votos / totalVotos) * 100 : 0;

                    contenedor.innerHTML += `
                        <div class="glass border border-white p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-500 hover:shadow-lg">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <h2 class="text-xs font-extrabold text-emerald-600 uppercase tracking-widest mb-1">Candidato Oficial</h2>
                                    <p class="text-xl font-bold text-slate-800">${c.nombre}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-3xl font-black text-slate-900">${c.votos}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Votos Totales</p>
                                </div>
                            </div>

                            <div class="relative w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                <div class="progress-glow bg-gradient-to-r from-emerald-400 to-emerald-600 h-full rounded-full transition-all duration-1000 ease-out" 
                                     style="width: ${porcentaje}%">
                                </div>
                            </div>
                            
                            <div class="mt-3 flex justify-between items-center">
                                <span class="text-[10px] font-bold text-slate-400">INTEGRIDAD VERIFICADA</span>
                                <span class="text-xs font-bold text-slate-700">${porcentaje.toFixed(1)}% de la votación</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }

        cargarResultados();
        setInterval(cargarResultados, 3000); // Actualiza cada 3 segundos para más fluidez
    </script>
</body>
</html>
